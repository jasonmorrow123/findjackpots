<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Map pin shape -->
  <path d="M40 8 C26 8 16 18 16 32 C16 50 40 72 40 72 C40 72 64 50 64 32 C64 18 54 8 40 8Z" fill="url(#pinGrad)"/>

  <!-- Die face inside pin (showing 3 pips like a 3-face die) -->
  <rect x="26" y="20" width="28" height="26" rx="5" fill="white" opacity="0.95"/>
  <!-- top-left pip -->
  <circle cx="33" cy="27" r="2.8" fill="#2563EB"/>
  <!-- center pip -->
  <circle cx="40" cy="33" r="2.8" fill="#2563EB"/>
  <!-- bottom-right pip -->
  <circle cx="47" cy="39" r="2.8" fill="#2563EB"/>

  <!-- Wordmark -->
  <text x="78" y="38" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#0F172A" letter-spacing="-0.5">Find</text>
  <text x="132" y="38" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#2563EB" letter-spacing="-0.5">Jackpots</text>

  <!-- Tagline -->
  <text x="79" y="56" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#6B7280" letter-spacing="0.3">Find your lucky casino</text>
</svg>
