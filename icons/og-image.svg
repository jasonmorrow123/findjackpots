<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="pin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#bdd4ff"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect x="12" y="12" width="44" height="44" rx="8" fill="none" stroke="white" stroke-width="2" opacity="0.08"/>
      <circle cx="34" cy="34" r="4" fill="white" opacity="0.08"/>
      <text x="14" y="122" font-size="36" fill="white" opacity="0.06" font-family="serif">♠</text>
      <text x="108" y="168" font-size="30" fill="white" opacity="0.06" font-family="serif">♦</text>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Pin icon -->
  <path d="M180 100 C126 100 84 142 84 196 C84 276 180 380 180 380 C180 380 276 276 276 196 C276 142 234 100 180 100Z" fill="url(#pin)"/>
  <rect x="132" y="148" width="96" height="88" rx="16" fill="#2563EB" opacity="0.9"/>
  <circle cx="156" cy="172" r="9" fill="white"/>
  <circle cx="180" cy="192" r="9" fill="white"/>
  <circle cx="204" cy="212" r="9" fill="white"/>

  <!-- Wordmark -->
  <text x="310" y="230" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="800" fill="white" letter-spacing="-2">Find</text>
  <text x="310" y="330" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="800" fill="rgba(255,255,255,0.75)" letter-spacing="-2">Jackpots</text>

  <!-- Tagline -->
  <text x="312" y="390" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.65)" letter-spacing="0.5">Find your lucky casino · findjackpots.com</text>

  <!-- Bottom accent -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.15)"/>
  <text x="600" y="617" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">JACKPOTS · LOYALTY · EVENTS · NEAR YOU</text>
